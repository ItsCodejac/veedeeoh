name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend & Type Check
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Verify Backend Dependencies
        run: |
          cd backend
          npm ci
