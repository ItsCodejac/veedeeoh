name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "tvlc.spec"
      - ".github/workflows/build-windows.yml"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: windows
            artifact: dist/veedeeoh.exe
            artifact_name: veedeeoh.exe
          - os: macos-latest
            label: macos
            artifact: dist/veedeeoh
            artifact_name: veedeeoh-macos
          - os: ubuntu-latest
            label: linux
            artifact: dist/veedeeoh
            artifact_name: veedeeoh-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --frozen
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: uv run pyinstaller tvlc.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "veedeeoh. build #${{ github.run_number }}"
          body: |
            Automated build from commit ${{ github.sha }}.

            **Windows:** Download `veedeeoh.exe` and double-click it. Your browser opens to `http://127.0.0.1:8321`.

            **macOS:** Download `veedeeoh-macos`, make it executable (`chmod +x veedeeoh-macos`), then run it. Your browser opens to `http://127.0.0.1:8321`.

            **Linux:** Download `veedeeoh-linux`, make it executable (`chmod +x veedeeoh-linux`), then run it. Your browser opens to `http://127.0.0.1:8321`.

            > VLC must be installed separately if you want "Open in VLC" to work.
          files: |
            artifacts/veedeeoh.exe/veedeeoh.exe
            artifacts/veedeeoh-macos/veedeeoh
            artifacts/veedeeoh-linux/veedeeoh
          draft: false
          prerelease: false
