name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "tvlc.spec"
      - ".github/workflows/build-windows.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --frozen
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller tvlc.spec --noconfirm

      - name: Zip dist
        run: |
          Compress-Archive -Path dist\veedeeoh -DestinationPath dist\veedeeoh-windows.zip
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: veedeeoh-windows
          path: dist/veedeeoh-windows.zip
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "veedeeoh. build #${{ github.run_number }}"
          body: |
            Automated Windows build from commit ${{ github.sha }}.

            **How to run:**
            1. Download `veedeeoh-windows.zip` and unzip it
            2. Open the `veedeeoh` folder
            3. Double-click `veedeeoh.exe`
            4. Your browser will open automatically to `http://127.0.0.1:8321`
          files: dist/veedeeoh-windows.zip
          draft: false
          prerelease: false
