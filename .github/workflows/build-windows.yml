name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "tvlc.spec"
      - ".github/workflows/build-windows.yml"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: windows
            exe: veedeeoh.exe
            zip_cmd: "Compress-Archive -Path dist/veedeeoh -DestinationPath dist/veedeeoh-windows.zip"
            zip_shell: pwsh
            artifact: veedeeoh-windows.zip
          - os: macos-latest
            label: macos
            exe: veedeeoh
            zip_cmd: "cd dist && zip -r veedeeoh-macos.zip veedeeoh"
            zip_shell: bash
            artifact: veedeeoh-macos.zip
          - os: ubuntu-latest
            label: linux
            exe: veedeeoh
            zip_cmd: "cd dist && tar -czf veedeeoh-linux.tar.gz veedeeoh"
            zip_shell: bash
            artifact: veedeeoh-linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --frozen
          uv pip install pyinstaller

      - name: Build with PyInstaller
        run: uv run pyinstaller tvlc.spec --noconfirm

      - name: Package dist
        run: ${{ matrix.zip_cmd }}
        shell: ${{ matrix.zip_shell }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: veedeeoh-${{ matrix.label }}
          path: dist/${{ matrix.artifact }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "veedeeoh. build #${{ github.run_number }}"
          body: |
            Automated build from commit ${{ github.sha }}.

            **Windows:**
            1. Download `veedeeoh-windows.zip` and unzip it
            2. Open the `veedeeoh` folder
            3. Double-click `veedeeoh.exe`
            4. Your browser opens automatically to `http://127.0.0.1:8321`

            **macOS:**
            1. Download `veedeeoh-macos.zip` and unzip it
            2. Open the `veedeeoh` folder
            3. Double-click `veedeeoh` (or run `./veedeeoh` in Terminal)
            4. Your browser opens automatically to `http://127.0.0.1:8321`

            **Linux:**
            1. Download `veedeeoh-linux.tar.gz` and extract it (`tar -xzf veedeeoh-linux.tar.gz`)
            2. Run `./veedeeoh/veedeeoh`
            3. Your browser opens automatically to `http://127.0.0.1:8321`

            > VLC must be installed separately if you want "Open in VLC" to work.
          files: |
            artifacts/veedeeoh-windows/veedeeoh-windows.zip
            artifacts/veedeeoh-macos/veedeeoh-macos.zip
            artifacts/veedeeoh-linux/veedeeoh-linux.tar.gz
          draft: false
          prerelease: false
