  <link rel="modulepreload" crossorigin href="/assets/auth-Dq18GEHP.js">
  <link rel="stylesheet" crossorigin href="/assets/main-De2y-ZeD.css">
</head>
<body>

  <!-- Sidebar Navigation Dock -->
  <aside>
    <a href="#" id="brand" class="brand">veedeeoh<span>.</span></a>
    <button id="tabHome" title="Home" class="navBtn active">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span>Home</span>
    </button>
    <button id="tabShows" title="Shows" class="navBtn">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>
      <span>Shows</span>
    </button>
    <button id="tabMovies" title="Movies" class="navBtn">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
      <span>Movies</span>
    </button>
    <button id="tabFavs" title="Favorites" class="navBtn">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
      <span>Favorites</span>
    </button>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-user" id="sidebarUser">
      <div class="sidebar-avatar" id="sidebarAvatar">?</div>
      <span class="sidebar-email" id="sidebarEmail"></span>
    </div>
    <button id="logoutBtn" class="navBtn sidebar-logout" title="Sign Out">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Sign Out</span>
    </button>
  </aside>

  <!-- Main Area -->
  <main id="mainContent">
    <div id="ambientGlow"></div>

    <!-- Header bar -->
    <header>
      <a href="#" class="mobile-brand">veedeeoh<span>.</span></a>
      <div id="searchContainer">
        <div id="searchBar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input id="search" type="search" placeholder="Search movies and shows..." autocomplete="off">
          <button id="searchCloseBtn" class="search-close-btn" title="Close search">✕</button>
        </div>
        <div id="searchResultsOverlay" hidden>
          <!-- Search results dynamically populated here -->
        </div>
      </div>
      <div class="header-right-group">
        <button id="searchToggleBtn" class="search-toggle-btn" title="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <div class="header-user-badge" id="headerUserBadge">
          <div class="sidebar-avatar" id="headerAvatar">?</div>
          <span class="sidebar-email" id="headerEmail"></span>
        </div>
      </div>
    </header>

    <!-- Scrollable main panel content -->
    <div id="scrollableArea">
      <!-- Panel 1: Home View -->
      <div id="homeView" class="viewPanel">
        <div id="homeHero"></div>
        <div id="homeRails"></div>
      </div>

      <!-- Panel 3: Shows View -->
      <div id="showsView" class="viewPanel" hidden>
        <div class="viewHeaderActions" style="margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px;">
          <input type="text" id="showsSearch" placeholder="Search shows..." class="searchBar" style="width: 100%; max-width: 400px; padding: 12px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--fg); font-family: inherit; font-size: 15px; outline: none;">
          <div id="showsGenreFilters" class="filterChips" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
        </div>
        <div id="showsHero"></div>
        <div id="showsRails"></div>
      </div>

      <!-- Panel 4: Movies View -->
      <div id="moviesView" class="viewPanel" hidden>
        <div class="viewHeaderActions" style="margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px;">
          <input type="text" id="moviesSearch" placeholder="Search movies..." class="searchBar" style="width: 100%; max-width: 400px; padding: 12px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--fg); font-family: inherit; font-size: 15px; outline: none;">
          <div id="moviesGenreFilters" class="filterChips" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
        </div>
        <div id="moviesHero"></div>
        <div id="moviesRails"></div>
      </div>

      <!-- Dedicated Category View Panel (Netflix / Hulu Pattern) -->
      <div id="categoryView" class="viewPanel" hidden>
        <div class="categoryHeaderBar">
          <button id="categoryBackBtn" class="categoryBackBtn">← Back</button>
          <div class="categoryHeaderTitleGroup">
            <h1 id="categoryTitleName">Category Name</h1>
            <span id="categoryItemCount" class="categoryCountBadge">0 titles</span>
          </div>
        </div>
        <div id="categoryGrid" class="categoryGridContainer"></div>
      </div>

    </div>
  </main>

  <!-- VOD Details overlay modal -->
  <div id="vodDetailsOverlay" hidden>
    <div id="vodDetailsAmbient"></div>
    <div id="vodDetails">
      <div id="vdHero">
        <div id="vdBanner"></div>
        <div id="vdHeroContent">
          <div id="vdPosterWrap">
            <span id="vdPoster"></span>
          </div>
          <div id="vdHeroMeta">
            <h1 id="vdTitle"></h1>
            <div id="vdMeta"></div>
            <div id="vdStars">★★★★★</div>
            <div id="vdActions">
              <button id="vdPlayBtn">▶ START WATCHING</button>
            </div>
            <p id="vdSummary"></p>
          </div>
          <button id="vdClose" title="Close show details">✕</button>
        </div>
      </div>
      <div id="vodDetailsBody">
        <div id="vdSelectorContainer">
          <select id="vdSeasonSelect"></select>
        </div>
        <div id="vdEpisodeGrid"></div>
      </div>
    </div>
  </div>

  <!-- Cinematic VOD Player Overlay -->
  <div id="vodPlayerOverlay" hidden>
    <video id="vodVideo" autoplay playsinline></video>
    
    <!-- Custom Video Controls Overlay -->
    <div class="vodControlsOverlay">
      <!-- Top Bar -->
      <div class="vodControlsTop">
        <button id="vodPlayerClose">← Back to Browse</button>
        <span id="vodPlayerTitle"></span>
        <div class="vodControlsTopRight">
          <button id="vodPlayerExpand" class="controlBtn" title="Expand Fullscreen" style="display: none;">↗ Expand</button>
          <button id="vodPlayerStop" class="controlBtn" title="Close Video" style="display: none;">✕</button>
        </div>
      </div>

      <!-- Center Feedback Ripple Badge (YouTube Style) -->
      <div class="vodControlsCenter" id="vodControlsCenter">
        <div id="vodCenterFeedback" class="centerFeedbackBadge">▶</div>
      </div>

      <!-- Bottom Bar -->
      <div class="vodControlsBottom">
        <!-- Progress Bar / Timeline -->
        <div class="vodTimelineContainer" id="vodTimelineContainer">
          <div class="vodTimelineProgress" id="vodTimelineProgress"></div>
          <div class="vodTimelineHandle" id="vodTimelineHandle"></div>
        </div>

        <div class="vodControlsRow">
          <div class="vodControlsLeft">
            <button id="vodPlayBtn" class="controlBtn">▶</button>
            <button id="vodRewindBtn" class="controlBtn" title="Rewind 10s">↺ 10s</button>
            <button id="vodForwardBtn" class="controlBtn" title="Forward 10s">↻ 10s</button>
            <button id="vodNextEpBtn" class="controlBtn" title="Next Episode" style="display: none;">➔|</button>
            <div class="vodTimeDisplay">
              <span id="vodTimeCurrent">00:00</span>
              <span>/</span>
              <span id="vodTimeTotal">00:00</span>
            </div>
          </div>

          <div class="vodControlsRight">
            <div class="vodVolumeControl">
              <button id="vodMuteBtn" class="controlBtn">🔊</button>
              <input type="range" id="vodVolumeSlider" min="0" max="1" step="0.05" value="1" class="volumeSlider">
            </div>
            <button id="vodCcBtn" class="controlBtn" title="Toggle Captions">CC</button>
            <button id="vodPipBtn" class="controlBtn" title="Picture in Picture">🗗</button>
            <button id="vodFullscreenBtn" class="controlBtn" title="Fullscreen">⛶</button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Floating Prompt Overlays (Skip Intro / Next Episode) -->
    <div id="vodPlayerPrompts">
      <button id="vodSkipIntroBtn" class="promptBtn" style="display: none;">Skip Intro (+90s)</button>
      <button id="vodNextEpPromptBtn" class="promptBtn" style="display: none;">Next Episode ➔</button>
    </div>
  </div>

  <!-- Party Mode Player Overlay -->
  <div id="partyPlayerOverlay" hidden>
    <div class="partyPlayerHeader">
      <button id="partyPlayerClose">← Back to Browse</button>
    </div>
    
    <canvas id="partyVisualizer"></canvas>
    
    <div id="partyLayout">
      <div id="partyControls">
        <div class="partyHeader">
          <span class="partyBrand">veedeeoh<span>.</span> party</span>
          <p class="partySubtitle">continuous music video & visualizer stream</p>
        </div>
        
        <div class="moodSelector">
          <button class="moodChip active" data-mood="chillout">🥞 Chillout</button>
          <button class="moodChip" data-mood="high-energy">🔥 High Energy</button>
          <button class="moodChip" data-mood="retro">📺 Retro</button>
        </div>
        
        <div id="partyTrackInfo" class="partyTrackInfo">
          <h2 id="partyTrackTitle">No Track Playing</h2>
          <span id="partyTrackGenre">Select a mood to begin</span>
          <p id="partyTrackSummary"></p>
        </div>
        
        <div class="partyButtons">
          <button id="partyPlayBtn" class="actionBtn primary">▶ PLAY</button>
          <button id="partyNextBtn" class="actionBtn">➔ NEXT TRACK</button>
        </div>

        <div class="visualizerSelector">
          <span>Visualizer:</span>
          <button id="visStyleBars" class="visStyleBtn active">Bars</button>
          <button id="visStyleWave" class="visStyleBtn">Wave</button>
        </div>
      </div>
      
      <div id="partyVideoCol">
        <div id="partyVideoWrapper">
          <video id="partyVideoA" autoplay playsinline></video>
          <video id="partyVideoB" autoplay playsinline></video>
        </div>
        <div id="partyQueuePanel">
          <h3>Upcoming Tracklist</h3>
          <div id="partyQueueList"></div>
        </div>
      </div>
    </div>
  </div>
