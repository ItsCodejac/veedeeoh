<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d15"/>
      <stop offset="100%" stop-color="#050609"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Container -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="6"/>

  <!-- Lowercase/Stylized V -->
  <path d="M 125 155 L 175 155 L 242 305 L 309 155 L 359 155 L 262 362 L 222 362 Z" fill="url(#vGrad)"/>

  <!-- Vibrant Lime Green Period Dot -->
  <circle cx="390" cy="345" r="28" fill="#c5f04e" filter="url(#greenGlow)"/>
</svg>
