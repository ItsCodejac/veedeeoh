<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Your Password — veedeeoh.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090e;
      --surface: #0e1219;
      --border: rgba(255,255,255,0.1);
      --accent: #c5f04e;
      --dim: rgba(255,255,255,0.55);
      --display: 'Outfit', sans-serif;
    }
    body {
      background: var(--bg);
      color: #fff;
      font-family: var(--display);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--dim);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 15px;
      font-family: var(--display);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
    }
    .rules {
      font-size: 12px;
      color: var(--dim);
      margin-bottom: 24px;
      padding: 12px 14px;
      background: rgba(197,240,78,0.06);
      border-radius: 8px;
      border: 1px solid rgba(197,240,78,0.15);
      line-height: 1.8;
    }
    .rules span { color: var(--accent); font-weight: 600; }
    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #07090e;
      font-size: 15px;
      font-weight: 800;
      font-family: var(--display);
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .message {
      margin-top: 18px;
      font-size: 14px;
      text-align: center;
      display: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
    }
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      margin-top: 8px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">veedeeoh.</div>
    <h1>Set Your Password</h1>
    <p class="subtitle">You're using a temporary password. Set a permanent one to continue to your library.</p>

    <div class="rules">
      Password must be <span>at least 8 characters</span> with a <span>number</span> and a <span>special character</span>.
    </div>

    <form id="changeForm">
      <div class="field">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="Enter new password" required autocomplete="new-password" />
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn" id="submitBtn">Set Password & Enter App</button>
    </form>

    <div class="message" id="message"></div>
  </div>

  <script type="module" src="/change-password.ts"></script>
</body>
</html>
